<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#06b6d4", // Cyan-500 equivalent for the glow
                        secondary: "#4f46e5", // Indigo for the badge
                        "background-light": "#f0f4f8",
                        "background-dark": "#020617", // Slate-950/Black mixture
                        "card-dark": "rgba(30, 41, 59, 0.7)", // Slate-800 with opacity
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px)",
                    }
                },
            },
        };
    </script>
<style>.bg-grid {
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 70%, transparent 95%);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glow-effect {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, rgba(6,182,212,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
        .diamond-shape {
            width: 200px;
            height: 200px;
            border: 2px solid rgba(6, 182, 212, 0.3);
            transform: rotate(45deg);
            position: relative;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2), inset 0 0 15px rgba(6, 182, 212, 0.1);
        }
        .diamond-shape::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            border: 2px solid rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }
        .diamond-shape::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(6, 182, 212, 0.2);
            border: 2px solid rgba(6, 182, 212, 0.8);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
        }
        .top-line-glow {
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 2px;
            background: linear-gradient(90deg, rgba(6,182,212,0) 0%, rgba(6,182,212,1) 50%, rgba(6,182,212,0) 100%);
            box-shadow: 0 0 10px rgba(6,182,212,0.8);
        }
    </style>
</head>
