<!DOCTYPE html>
<html lang="en"><head>

<title>Social Media Crawling</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#22c55e", // Green-500 equivalent for the neon glow
              "background-light": "#0f172a", // Slate-900 (simulating dark mode always for this specific aesthetic)
              "background-dark": "#050b14", // Very dark blue/black
              "card-bg": "rgba(255, 255, 255, 0.05)",
              "glass-border": "rgba(255, 255, 255, 0.1)",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, #1e293b 1px, transparent 1px), linear-gradient(to bottom, #1e293b 1px, transparent 1px)",
            }
          },
        },
      };
    </script>
<style>.neon-glow {
            box-shadow: 0 0 100px 20px rgba(34, 197, 94, 0.2);
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
        }
        .card-backdrop {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }@keyframes drift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }
        .grid-bg {
            background-size: 50px 50px;
            animation: drift 20s linear infinite;
        }
    </style>
</head>
