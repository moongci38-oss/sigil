<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: #0F172A;
    color: #E2E8F0;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 50% 100%, rgba(255,255,255,0.012) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    width: 1920px;
    height: 1080px;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .header h1 { font-size: 36px; font-weight: 800; color: #F8FAFC; }

  .tag {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .tag.mobile { background: #7C3AED; color: #fff; }
  .tag.web { background: #2563EB; color: #fff; }
  .tag.infrastructure { background: #059669; color: #fff; }
  .tag.fullstack { background: #6366F1; color: #fff; }
  .tag.tool { background: #F59E0B; color: #1E293B; }

  .timeline {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    padding-left: 40px;
    z-index: 1;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 2px;
  }

  .timeline::before {
    background: linear-gradient(180deg, var(--gs, #3B82F6), var(--ge, #2563EB));
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
  }

  .challenge-item {
    position: relative;
    background: #1E293B;
    border: 1px solid #334155;
    border-radius: 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  .challenge-item::before {
    content: '';
    position: absolute;
    left: -33px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 3px solid;
    background: #0F172A;
  }

  .challenge-item::before { border-color: var(--accent, #60A5FA); }

  .challenge-watermark {
    position: absolute;
    top: 12px;
    right: 20px;
    font-size: 64px;
    font-weight: 900;
    opacity: 0.03;
    color: #fff;
    pointer-events: none;
    line-height: 1;
  }

  .challenge-number {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .challenge-number { color: var(--accent, #60A5FA); }

  .challenge-text {
    line-height: 1.7;
    color: #CBD5E1;
  }

  .challenge-keywords {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .keyword {
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(255,255,255,0.06);
    color: #94A3B8;
    border: 1px solid #334155;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="title">Technical Challenges</h1>
    <span class="tag" id="tag"></span>
  </div>
  <div class="timeline" id="timeline"></div>
</div>

<script>
  var data = window.PROJECT_DATA || {};
  var cat = data.category || 'web';
  var colors = data.colors || {};
  var root = document.documentElement;
  root.style.setProperty('--gs', colors.gradientStart || '#3B82F6');
  root.style.setProperty('--ge', colors.gradientEnd || '#2563EB');
  root.style.setProperty('--accent', colors.accent || '#60A5FA');
  document.getElementById('title').textContent = (data.title || 'Project') + ' Technical Challenges';
  var tag = document.getElementById('tag');
  tag.className = 'tag ' + cat;
  tag.textContent = cat.toUpperCase();

  var timeline = document.getElementById('timeline');
  timeline.className = 'timeline';

  var challenges = data.technical_challenges_ko || [];
  var count = challenges.length;

  var cardPadding, textSize, gap;
  if (count <= 3) {
    cardPadding = '36px 44px';
    textSize = '18px';
    gap = '28px';
  } else if (count <= 4) {
    cardPadding = '28px 36px';
    textSize = '17px';
    gap = '22px';
  } else if (count <= 5) {
    cardPadding = '24px 32px';
    textSize = '16px';
    gap = '18px';
  } else {
    cardPadding = '20px 28px';
    textSize = '15px';
    gap = '14px';
  }

  timeline.style.gap = gap;

  challenges.slice(0, 6).forEach(function(c, i) {
    var item = document.createElement('div');
    item.className = 'challenge-item';
    item.style.padding = cardPadding;

    var techTerms = c.match(/[A-Z][a-zA-Z0-9.]+|[a-z]+(?:-[a-z]+)+|[A-Z]{2,}/g) || [];
    var unique = [];
    techTerms.forEach(function(t) { if (unique.indexOf(t) === -1) unique.push(t); });
    var keywords = unique.slice(0, 4);

    item.innerHTML =
      '<div class="challenge-watermark">' + String(i + 1).padStart(2, '0') + '</div>' +
      '<div class="challenge-number">CHALLENGE #' + (i + 1) + '</div>' +
      '<div class="challenge-text" style="font-size:' + textSize + '">' + c + '</div>' +
      (keywords.length > 0 ?
        '<div class="challenge-keywords">' +
        keywords.map(function(k) { return '<span class="keyword">' + k + '</span>'; }).join('') +
        '</div>' : '');

    timeline.appendChild(item);
  });
</script>
</body>
</html>
